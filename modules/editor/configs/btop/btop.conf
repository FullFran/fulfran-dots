#? Config file for btop v.1.4.7

# Hackerman Tokyo Night: tuned for the tmux popup.
color_theme = "hackerman-tokyo-night"
theme_background = true
truecolor = true
force_tty = false
disable_presets = "Off"

# Preset 0 keeps everything visible. Presets 1-3 are quick alternate views.
presets = "cpu:1:braille,gpu0:0:braille,proc:0:braille cpu:0:braille,mem:0:block,gpu0:0:braille,net:0:braille cpu:0:block,mem:0:block,gpu0:0:braille,net:0:tty,proc:1:braille"

vim_keys = true
disable_mouse = false
rounded_corners = true
terminal_sync = true

graph_symbol = "braille"
graph_symbol_cpu = "braille"
graph_symbol_gpu = "braille"
graph_symbol_mem = "block"
graph_symbol_net = "braille"
graph_symbol_proc = "braille"

shown_boxes = "cpu mem gpu0 net proc"
update_ms = 1000

proc_sorting = "cpu lazy"
proc_reversed = false
proc_tree = false
proc_colors = true
proc_gradient = true
proc_per_core = false
proc_mem_bytes = true
proc_cpu_graphs = true
proc_info_smaps = false
proc_left = false
proc_filter_kernel = false
proc_follow_detailed = true
proc_aggregate = false
keep_dead_proc_usage = false

cpu_graph_upper = "total"
