# ============================================================================
# TOKYO NIGHT TMUX CONFIG - Workspace Manager
# Theme: bg=#1a1b26, fg=#a9b1d6, accent=#7aa2f7, purple=#bb9af7, green=#9ece6a, red=#f7768e
# ============================================================================

# ============================================================================
# TRUE COLOR (MANDATORY)
# ============================================================================
set -g default-shell "${HOME}/.nix-profile/bin/zsh"
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"
set -ga terminal-features ",*:RGB"

# Ghostty + tmux + dead keys: keep modern colors, but avoid asking the terminal
# for xterm/extended keyboard protocols here. On some non-US layouts, those
# protocols break dead-key composition inside tmux (á/é/í/ó/ú end up as plain
# vowels). We keep the terminal modern for color, but prefer layout-safe input.
set -g extended-keys off
set -g xterm-keys off

# Ghostty emits this explicit sequence for Ctrl+Shift+Tab. Capture it as a
# tmux UserKey so we avoid global extended-key protocols that break dead keys.
set -s user-keys[1] "\e[27;6;9~"

# ============================================================================
# PREFIX: Ctrl+Space (more ergonomic than Ctrl+B)
# ============================================================================
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

# ============================================================================
# SANE DEFAULTS
# ============================================================================
set -g history-limit 50000
set -g escape-time 10
set -g focus-events on
set -g renumber-windows on
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'
set -g display-time 1000
set -g exit-empty on

# ============================================================================
# BASE INDEX 1
# ============================================================================
set -g base-index 1
set -g pane-base-index 1

# ============================================================================
# MOUSE
# ============================================================================
set -g mouse on

# ============================================================================
# COPY MODE — Vim style
# ============================================================================
setw -g mode-keys vi

bind -n C-S-Escape copy-mode

bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi V   send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel 'wl-copy'
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel 'wl-copy'

bind -T copy-mode-vi h     send -X cursor-left
bind -T copy-mode-vi l     send -X cursor-right
bind -T copy-mode-vi k     send -X cursor-up
bind -T copy-mode-vi j     send -X cursor-down
bind -T copy-mode-vi Up    send -X cursor-up
bind -T copy-mode-vi Down  send -X cursor-down
bind -T copy-mode-vi Left  send -X cursor-left
bind -T copy-mode-vi Right send -X cursor-right

bind -T copy-mode-vi w  send -X next-word
bind -T copy-mode-vi b  send -X previous-word
bind -T copy-mode-vi 0  send -X start-of-line
bind -T copy-mode-vi '$' send -X end-of-line

bind -T copy-mode-vi y  send -X copy-pipe-and-cancel 'wl-copy'
bind -T copy-mode-vi Y  send -X select-line \; send -X copy-pipe-and-cancel 'wl-copy'

bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi q      send -X cancel

# ============================================================================
# VIM NAVIGATION
# ============================================================================
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ============================================================================
# WORKSPACE MANAGER KEYBINDINGS
# ============================================================================
bind c new-window -a -c "#{pane_current_path}"
bind , command-prompt "rename-window '%%'"
bind n next-window
bind p previous-window
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind z resize-pane -Z
bind x kill-pane
bind & kill-window

bind d detach-client
bind s choose-tree -Zs
bind $ command-prompt "rename-session '%%'"
bind k confirm-before -p "Kill session '#{session_name}'? (y/n)" \
  "run-shell 'tmux switch-client -p 2>/dev/null || true' ; kill-session"

bind -r Left  swap-window -t -1 \; select-window -t -1
bind -r Right swap-window -t +1 \; select-window -t +1

bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"
bind ! break-pane -t :.

# ============================================================================
# GHOSTTY-STYLE KEYBINDINGS (no prefix)
# ============================================================================
bind -n C-S-t new-window -a -c "#{pane_current_path}"
bind -n C-Tab next-window
bind -n C-S-Tab previous-window
bind -n User1 previous-window
bind -n C-S-w kill-pane

bind -n C-S-r split-window -h -c "#{pane_current_path}"
bind -n C-S-f split-window -v -c "#{pane_current_path}"

bind -n C-S-d detach-client

bind -n C-S-h select-pane -L
bind -n C-S-j select-pane -D
bind -n C-S-l select-pane -R

bind -n C-S-b switch-client -l

bind -n C-S-k confirm-before -p "Kill session '#S'? (y/n)" \
  "run-shell 'tmux switch-client -p 2>/dev/null || true' ; kill-session"

bind -n C-S-z resize-pane -Z

# Session switcher — clean fzf-based, no agent indicators
bind -n C-S-s display-popup -E -w 60% -h 60% \
  "tmux list-sessions -F '#{session_name}' | \
   fzf \
    --prompt='  Session > ' \
    --header='Enter: switch  |  Ctrl+K: kill' \
    --bind='ctrl-k:execute(tmux switch-client -p 2>/dev/null; tmux kill-session -t {2})+reload(tmux list-sessions -F #{session_name})' \
    --height=100% \
    --border=rounded \
    --color='border:#7aa2f7,label:#7aa2f7,prompt:#bb9af7,pointer:#7dcfff,header:#565f89' \
    --layout=reverse | xargs -I{} tmux switch-client -t {}"

bind -n C-S-e command-prompt -p "Session name:" "new-session -s '%%'"
bind -n C-S-n command-prompt -I "#S" "rename-session '%%'"

# System monitor — Prefix+u opens btop in floating popup
bind u display-popup -E -w 95% -h 95% -b rounded \
  -s "fg=#9ece6a" -T "btop — system monitor" \
  -d "#{pane_current_path}" "btop"

# File manager — Prefix+e opens yazi in a temporary window
bind e new-window -c "#{pane_current_path}" -n "yazi" "yazi"

# ============================================================================
# VIM-TMUX-NAVIGATOR INTEGRATION
# ============================================================================
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# ============================================================================
# APPEARANCE - TOKYO NIGHT
# ============================================================================
set -g status-bg "#1a1b26"
set -g status-fg "#a9b1d6"

# Status bar left: session name
set -g status-left "#[fg=#1a1b26,bg=#7aa2f7,bold] #S #[fg=#7aa2f7,bg=#1a1b26]│"
set -g status-left-length 40

# Status bar right: time + date
set -g status-right "#[fg=#414868,bg=#1a1b26]│#[fg=#a9b1d6,bg=#414868] %H:%M #[fg=#bb9af7,bg=#414868]│#[fg=#1a1b26,bg=#bb9af7] %d/%m "
set -g status-right-length 80

# Center windows
set -g status-justify centre

# Update interval
set -g status-interval 5

# Inactive window style
set -g window-status-format "#[fg=#565f89,bg=#1a1b26] #W#[fg=#414868]  #[fg=#9ece6a]#(git -C '#{pane_current_path}' rev-parse --abbrev-ref HEAD 2>/dev/null) "

# Active window style
set -g window-status-current-format "#[fg=#7aa2f7,bg=#1a1b26]│#[fg=#1a1b26,bg=#7aa2f7,bold] #W #[fg=#1a1b26,bg=#7aa2f7]#(git -C '#{pane_current_path}' rev-parse --abbrev-ref HEAD 2>/dev/null) #[fg=#7aa2f7,bg=#1a1b26]│"

# ============================================================================
# BELL MONITORING
# ============================================================================
setw -g monitor-silence 0
set -g silence-action none

setw -g monitor-bell on
set -g bell-action other
setw -g window-status-bell-style "fg=#e0af68,bg=#1a1b26,bold,underscore"

# ============================================================================
# PANE BORDERS
# ============================================================================
set -g pane-border-style "fg=#414868"
set -g pane-active-border-style "fg=#7aa2f7"
set -g pane-border-lines single

# ============================================================================
# MESSAGES
# ============================================================================
set -g message-style "bg=#7aa2f7,fg=#1a1b26,bold"
set -g message-command-style "bg=#bb9af7,fg=#1a1b26"

# ============================================================================
# CLOCK
# ============================================================================
set -g clock-mode-colour "#7aa2f7"
set -g clock-mode-style 24

# ============================================================================
# ACTIVITY MONITORING
# ============================================================================
set -g monitor-activity on
set -g visual-activity off
set -g window-status-activity-style "fg=#f7768e,bg=#1a1b26"

# ============================================================================
# RESURRECT + CONTINUUM (managed by home-manager plugins list)
# ============================================================================
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @resurrect-capture-pane-contents 'on'
